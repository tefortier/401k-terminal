name: Update monthly picks

on:
  # Runs at 9pm ET on the 1st of every month (after month-end prices settle)
  schedule:
    - cron: '0 2 1 * *'

  # Also allows manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy pandas

      - name: Calculate picks
        run: python scripts/calculate_picks.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "Monthly picks update $(date +'%B %Y')"
          git push
